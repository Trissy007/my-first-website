<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 20px auto;
            text-align: center;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

<header>
    <h1>My Website</h1>
</header>

<div class="container">
    <div class="card">
        <h2>Hello 👋</h2>
        <p>Welcome to my first styled website!</p>
        <button onclick="sayHello()">Click me</button>
    </div>
</div>

<script>
function sayHello() {
    alert("You're doing great! 🚀");
}
</script>

</body>
</html>
<img src="https://via.placeholder.com/300" alt="Sample image" style="width:100%; border-radius:10px;">
